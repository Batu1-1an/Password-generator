<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Password Generator</h1>
            <div class="theme-switch-wrapper">
                <label class="theme-switch" for="theme-checkbox">
                    <input type="checkbox" id="theme-checkbox" />
                    <div class="slider round"></div>
                </label>
                <span>Dark Mode</span>
            </div>
        </div>

        <div class="password-display-container">
            <input type="text" id="password-display" readonly placeholder="Your password here...">
            <button id="copy-button" title="Copy to clipboard">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-clipboard" viewBox="0 0 16 16">
                  <path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/>
                  <path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z"/>
                </svg>
                Copy
            </button>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="length-slider">Password Length: <span id="length-value">12</span></label>
                <input type="range" id="length-slider" min="8" max="32" value="12">
            </div>

            <div class="control-group checkboxes">
                <label><input type="checkbox" id="include-uppercase" checked> Include Uppercase (A-Z)</label>
                <label><input type="checkbox" id="include-lowercase" checked> Include Lowercase (a-z)</label>
                <label><input type="checkbox" id="include-numbers" checked> Include Numbers (0-9)</label>
                <label><input type="checkbox" id="include-symbols"> Include Symbols (!@#$...)</label>
                <label><input type="checkbox" id="exclude-ambiguous"> Exclude Ambiguous (I, l, 1, O, 0)</label>
            </div>

            <div class="control-group strength-indicator">
                <label>Strength:</label>
                <div id="strength-bar-container">
                    <div id="strength-bar"></div>
                </div>
                <span id="strength-text"></span>
            </div>

            <button id="generate-button">Generate Password</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
